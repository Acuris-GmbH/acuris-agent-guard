name: Publish to PyPI

# Publishes to PyPI via OIDC Trusted Publishing — NO API token stored.
# Triggers when you publish a GitHub Release (bump the version in pyproject.toml
# first; PyPI rejects re-uploading an existing version). workflow_dispatch lets
# you run it manually too.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI (Trusted Publishing)
    needs: build
    runs-on: ubuntu-latest
    environment: pypi          # must match the "Environment name" in the PyPI publisher
    permissions:
      id-token: write          # REQUIRED: mints the OIDC token PyPI verifies
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
